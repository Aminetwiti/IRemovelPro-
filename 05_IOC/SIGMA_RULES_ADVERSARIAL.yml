title: iAct8 Lab — Bulk RSA-2048 Keypair Generation in Offender Process
id: 8f4a1b3c-ire-0023
status: experimental
description: |
  Detects generation of multiple fresh RSA-2048 keypairs in a short
  window by the same process. This is the behavioural signature of
  §22 case 2/3/7 (attacker re-signs the bplist with their own key
  and re-verifies). Each iteration of the §21 pipeline produces a
  new keypair; an attacker iterating the pipeline N times to test
  signatures will produce N keypairs in a few seconds.

  Reference: 01_REPORTS/BYPASS_CORE.md §23
  Author: Audit statique — 2026-06-22
  TLP: LEAKED
references:
  - https://attack.mitre.org/techniques/T1573/  # Encrypted Channel
  - https://attack.mitre.org/techniques/T1027/  # Obfuscated Files
logsource:
  category: process_access
  product: windows
detection:
  selection_cryptoapi:
    SourceImage|endswith:
      - '\python.exe'
      - '\pythonw.exe'
      - '\powershell.exe'
      - '\cmd.exe'
    CallTrace|contains:
      - 'cryptsp.dll'
      - 'bcrypt.dll'
      - 'ncrypt.dll'
  selection_count:
    # Same source process, multiple calls within 60s
  condition: selection_cryptoapi
  timeframe: 60s
fields:
  - SourceImage
  - SourceProcessId
  - CallTrace
  - User
falsepositives:
  - Cryptography developers iterating test fixtures
  - iRemoval PRO v5.2 itself (the binary, not the lab pipeline)
level: high
tags:
  - attack.defense_evasion
  - attack.t1573
  - attack.t1027
  - iRemovalLabTest

