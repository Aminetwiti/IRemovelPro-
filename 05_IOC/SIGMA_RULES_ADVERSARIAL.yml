title: iAct8 Lab — iRemoval OFFENSIVE Test Marker in Production Envelope
id: 8f4a1b3c-ire-0024
status: experimental
description: |
  Detects the lab_marker field "iRemovalOFFENSIVE Test" in any
  JSON envelope that crosses the wire (file write, network
  egress, or process arg). This marker is emitted by
  test_adversarial.py for every envelope (cases 1, 3, 8, 9, 10).
  An attacker reusing the §21 pipeline outside the lab will
  propagate this marker unless they patch the source.

  Reference: 01_REPORTS/BYPASS_CORE.md §23
  Author: Audit statique — 2026-06-22
  TLP: LEAKED
references:
  - https://attack.mitre.org/techniques/T1027/
logsource:
  category: file_event
  product: windows
detection:
  selection_marker:
    TargetFilename|endswith:
      - '.json'
    TargetFilename|contains:
      - 'iact'
      - 'envelope'
      - 'activation'
    TargetContent|contains:
      - 'iRemovalOFFENSIVE Test'
  condition: selection_marker
fields:
  - TargetFilename
  - TargetContent
  - User
  - Image
falsepositives:
  - The lab itself (test_adversarial.py) — expected
  - Replays of §21 fixtures in an isolated test environment
level: high
tags:
  - attack.defense_evasion
  - attack.t1027
  - iRemovalLabTest

