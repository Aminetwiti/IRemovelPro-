title: iAct8 Lab — Repeated iActivation Envelope Verification
id: 8f4a1b3c-ire-0025
status: experimental
description: |
  Detects the same iActivation envelope being verified (signature
  check) more than 3 times in 5 minutes by the same process.
  This is the behavioural signature of §22 case 10 (replay) and
  also of an attacker iterating variations of the same forged
  envelope to find one iOS accepts.

  Reference: 01_REPORTS/BYPASS_CORE.md §23
  Author: Audit statique — 2026-06-22
  TLP: LEAKED
references:
  - https://attack.mitre.org/techniques/T1497/  # VM/Sandbox Evasion
  - https://attack.mitre.org/techniques/T1116/  # Code Signing (bypass)
logsource:
  category: process_access
  product: windows
detection:
  selection_seckey:
    SourceImage|endswith:
      - '\python.exe'
      - '\pythonw.exe'
      - '\powershell.exe'
      - '\iRemoval PRO.exe'
      - '\iremovalpro.dll'
    CallTrace|contains:
      - 'SecKeyRawVerify'
      - 'BCryptVerifySignature'
      - 'CryptVerifySignatureW'
      - 'CryptVerifySignatureA'
  condition: selection_seckey
  timeframe: 5m
  count: 3
fields:
  - SourceImage
  - SourceProcessId
  - CallTrace
  - User
falsepositives:
  - Legitimate iOS device drivers doing key verification
  - Software signing tools (signtool, OpenSSL) iterating test signatures
level: medium
tags:
  - attack.defense_evasion
  - attack.t1497
  - iRemovalLabTest
