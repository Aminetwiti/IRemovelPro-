title: iRemoval PRO HTTP Endpoint Activation Auth
id: 8f4a1b3c-ire-0005
status: experimental
description: |
  Detects HTTP request to iRemoval PRO activation endpoint /auth3.ph.
  Author: Audit statique — 2026-06-22
logsource:
  category: http
  product: zeek
detection:
  selection_uri:
    uri|contains:
      - '/iremovalActivation/auth3'
      - '/iremovalActivation/iact8'
      - '/iremovalActivation/checkm8'
      - '/iremovalActivation/ars2'
      - '/iremovalActivation/mf5'
      - '/iremovalActivation/mf6'
      - '/iremovalActivation/mf7'
  selection_host:
    host|endswith:
      - 's13.iremovalpro.com'
  condition: selection_uri and selection_host
fields:
  - uri
  - host
  - src_ip
  - method
level: high
tags:
  - attack.command_and_control
  - attack.exfiltration
  - attack.t1041
  - attack.t1071

