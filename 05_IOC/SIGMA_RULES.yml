title: iRemoval PRO Installation - File Creation
id: 8f4a1b3c-ire-0001
status: experimental
description: |
  Detects the presence of iRemoval PRO bypass tool installation files.
  iRemoval PRO is a commercial tool that bypasses Apple's iCloud Activation Lock.
  Author: Audit statique — 2026-06-22
  TLP: LEAKED
  Reference: https://attack.mitre.org/techniques/T1561/
references:
  - https://bypassfrpfiles.com
logsource:
  category: file_event
  product: windows
detection:
  selection_files:
    TargetFilename|endswith:
      - '\iRemoval PRO.exe'
      - '\iremovalpro.dll'
  selection_paths:
    TargetFilename|contains:
      - '\Bypassfrpfiles.com\'
      - '\iRemoval PRO\'
  condition: selection_files or selection_paths
fields:
  - TargetFilename
  - User
  - Image
falsepositives:
  - Legitimate installation in isolated test environment (uncommon)
level: high
tags:
  - attack.defense_evasion
  - attack.impact
  - attack.t1561
  - attack.t1656

---
title: iRemoval PRO Process Execution
id: 8f4a1b3c-ire-0002
status: experimental
description: |
  Detects execution of iRemoval PRO main executable.
  Author: Audit statique — 2026-06-22
logsource:
  category: process_creation
  product: windows
detection:
  selection_img:
    Image|endswith:
      - '\iRemoval PRO.exe'
  selection_hash:
    Hashes|contains:
      - 'IMPHASH=N/A'  # managed assembly
  condition: selection_img
fields:
  - Image
  - CommandLine
  - User
  - ParentImage
falsepositives:
  - Unknown
level: high
tags:
  - attack.execution
  - attack.defense_evasion
  - attack.impact

