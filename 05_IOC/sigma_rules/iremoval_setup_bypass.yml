title: SSH-Based iOS Plist Injection Activity
id: d0a6b154-9f7g-5h5d-c8e0-6g1d4f3h7c9e
status: experimental
description: Détecte l'activité SSH suspecte ciblant les fichiers plist de configuration iOS
author: Defensive Analysis v5.2-LAB-0.3
date: 2026/06/23
references:
    - 02_SCRIPTS/13_ios_setup_bypass/plist_patcher.py
tags:
    - attack.lateral_movement
    - attack.t1021.004  # Remote Services: SSH
    - attack.t1070.004  # Indicator Removal: File Deletion (backup creation)
logsource:
    product: ios
    service: auth
detection:
    selection_ssh_login:
        EventID: 'ssh_authentication'
        User: 'root'
        AuthMethod: 'password'
        Result: 'success'
    
    selection_sftp_transfer:
        EventID: 'sftp_file_transfer'
        Direction: 'upload'
        TargetFilename|contains:
            - 'com.apple.purplebuddy.plist'
            - 'com.apple.PreBoard.plist'
            - 'activation_record.plist'
    
    selection_backup_creation:
        EventID: 'file_create'
        TargetFilename|endswith: '.plist.bak'
        User: 'root'
    
    selection_permission_change:
        EventID: 'file_permissions_modify'
        CommandLine|contains:
            - 'chmod 644'
            - 'chown mobile:mobile'
        TargetFilename|contains: '.plist'
    
    timeframe: 2m
    
    condition: 
        selection_ssh_login and 
        (selection_sftp_transfer or selection_backup_creation) and
        selection_permission_change

falsepositives:
    - Administration iOS légitime via SSH
    - Backup/restore manuel de configuration
level: high
