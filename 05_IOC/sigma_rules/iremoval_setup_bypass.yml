title: MobileActivationDaemon Runtime Hooking via Substrate
id: c9f5a043-8e6f-4g4c-b7d9-5f0c3e2g6b8d
status: experimental
description: Détecte l'injection de hooks Substrate/Logos dans MobileActivationDaemon (couche 4 du bypass)
author: Defensive Analysis v5.2-LAB-0.3
date: 2026/06/23
references:
    - AXE5_DECOMPILATION_FINDINGS.md Section 6
    - https://iphonedev.wiki/index.php/MobileActivationDaemon
tags:
    - attack.defense_evasion
    - attack.t1055  # Process Injection
    - attack.t1574.006  # Hijack Execution Flow: Dynamic Linker Hijacking
logsource:
    product: ios
    service: syslog
detection:
    selection_dylib_load:
        EventID: 'library_load'
        ProcessName: 'mobileactivationd'
        ImageLoaded|contains:
            - '/Library/MobileSubstrate/DynamicLibraries/'
            - 'iremoval'
            - 'bypass'
            - '.dylib'
    
    selection_hook_symbols:
        EventID: 'symbol_resolution'
        Symbol|contains:
            - 'MSHookMessageEx'
            - 'MSHookFunction'
            - '_logos_method'
            - '_logos_orig'
    
    selection_hooked_methods:
        EventID: 'method_swizzle'
        TargetClass: 'MADaemon'
        Method|contains:
            - 'isActivated'
            - 'handleActivationInfo'
            - 'copyActivationRecord'
    
    selection_substrate_init:
        EventID: 'process_create'
        ParentProcessName: 'mobileactivationd'
        CommandLine|contains: 'SubstrateLoader'
    
    condition: 
        selection_dylib_load or
        (selection_hook_symbols and selection_hooked_methods) or
        selection_substrate_init

falsepositives:
    - Tweaks Cydia/Sileo légitimes (très rare sur mobileactivationd)
    - Debugging avec lldb/debugserver
level: critical
