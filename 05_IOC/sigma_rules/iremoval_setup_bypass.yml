title: Python Paramiko SSH Client Execution for iOS Injection
id: e1b7c265-0g8h-6i6e-d9f1-7h2e5g4i8d0f
status: experimental
description: Détecte l'exécution de scripts Python utilisant Paramiko pour injecter des plists iOS
author: Defensive Analysis v5.2-LAB-0.3
date: 2026/06/23
references:
    - 02_SCRIPTS/13_ios_setup_bypass/plist_patcher.py
tags:
    - attack.execution
    - attack.t1059.006  # Command and Scripting Interpreter: Python
logsource:
    category: process_creation
    product: windows
detection:
    selection_python:
        Image|endswith: 
            - '\python.exe'
            - '\python3.exe'
        CommandLine|contains: 
            - 'plist_patcher.py'
            - 'inject_plists'
            - 'forge_plists'
    
    selection_paramiko:
        CommandLine|contains: 
            - 'import paramiko'
            - 'paramiko.SSHClient'
            - 'paramiko.AutoAddPolicy'
    
    selection_targets:
        CommandLine|contains:
            - 'com.apple.purplebuddy'
            - 'mobileactivationd'
            - '--mode inject'
            - '--host'
    
    condition: 
        selection_python and (selection_paramiko or selection_targets)

falsepositives:
    - Développement/test de scripts Python SSH légitimes
    - Outils d'administration iOS
level: high
