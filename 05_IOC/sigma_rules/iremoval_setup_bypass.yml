title: iRemoval PRO Network C2 Communication
id: b8e4f932-7d5e-4f3b-a6c8-4e9b2d1f5a7c
status: stable
description: Détecte les communications réseau vers le backend iRemoval PRO (s13.iremovalpro.com)
author: Defensive Analysis v5.2-LAB-0.3
date: 2026/06/23
references:
    - RAPPORT_FINAL_5_AXES.md
    - 01_REPORTS/REPORT_SERVER_PROTOCOL.md
tags:
    - attack.command_and_control
    - attack.t1071.001  # Application Layer Protocol: Web Protocols
    - attack.t1573.002  # Encrypted Channel: Asymmetric Cryptography
logsource:
    category: proxy
detection:
    selection_domain:
        c-uri|contains:
            - 's13.iremovalpro.com'
            - 'api.iremovalpro.com'
            - 'iremovalpro.com/api/'
    
    selection_endpoint:
        c-uri|endswith:
            - '/check_sn'
            - '/check_imei'
            - '/activate_device'
            - '/get_bypass_config'
            - '/upload_device_info'
    
    selection_useragent:
        cs-User-Agent|contains:
            - 'iRemovalPRO/'
            - 'RestSharp/'
            - 'libimobiledevice'
    
    selection_post:
        cs-method: 'POST'
        c-uri|contains: '/api/'
    
    condition: 
        (selection_domain and selection_endpoint) or
        (selection_domain and selection_useragent) or
        (selection_domain and selection_post)

falsepositives:
    - Analyse de sécurité légitime du logiciel iRemoval PRO
    - Environnement de test contrôlé
level: high
