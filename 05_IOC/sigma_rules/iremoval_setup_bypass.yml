title: iOS Activation Lock Bypass via Setup Assistant Plist Injection
id: a7f3e821-9c4d-4e2a-b5d7-3f8a1c2e4d6b
status: experimental
description: Détecte la modification des plists critiques de l'Assistant de configuration iOS pour contourner l'Activation Lock
author: Defensive Analysis v5.2-LAB-0.3
date: 2026/06/23
references:
    - RAPPORT_FINAL_5_AXES.md
    - AXE5_DECOMPILATION_FINDINGS.md
    - https://github.com/ios-reverse-engineering/SetupAssistant-bypass
tags:
    - attack.defense_evasion
    - attack.t1222  # File and Directory Permissions Modification
    - attack.t1564.001  # Hidden Files and Directories
logsource:
    product: ios
    service: syslog
detection:
    selection_plist_write:
        EventID: 
            - 'file_create'
            - 'file_modify'
        TargetFilename|contains:
            - '/var/mobile/Library/Preferences/com.apple.purplebuddy.plist'
            - '/var/mobile/Library/Preferences/com.apple.PreBoard.plist'
            - 'systemgroup.com.apple.mobileactivationd/activation_records/activation_record.plist'
    
    selection_ssh_session:
        EventID: 'ssh_login'
        User: 'root'
        SourceIP|re: '192\.168\.\d{1,3}\.\d{1,3}'  # LAN injection
    
    selection_daemon_kill:
        EventID: 'process_terminate'
        ProcessName: 'mobileactivationd'
        CommandLine|contains: 'killall -9'
    
    selection_setup_keys:
        EventID: 'plist_modify'
        Key|contains:
            - 'SetupDone'
            - 'ActivationState'
            - 'FairPlayKeyData'
        Value|contains:
            - 'true'
            - 'Activated'
            - 'AAAAAAAAAAAAAAAA'  # base64 null bytes
    
    timeframe: 5m
    
    condition: 
        (selection_plist_write and selection_ssh_session and selection_daemon_kill) or
        (selection_plist_write and selection_setup_keys)

falsepositives:
    - Processus légitime de configuration iOS lors du premier démarrage
    - Restauration depuis backup iTunes/Finder
    - Mise à jour iOS OTA (Over-The-Air)
level: high
