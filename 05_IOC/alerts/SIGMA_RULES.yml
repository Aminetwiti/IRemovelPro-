title: iRemoval PRO Mock Server - server_proc_ms Anomaly
id: 8f4a1b3c-ire-0017
status: experimental
description: |
  Detects anomalous server processing times at /apple_drm_check.ph.
  A pre-signed (replayed) ticket is typically validated in <5ms because
  the defender does no real RSA work — it just verifies the SHA-1 of
  the modulus against the blacklist. A sudden drop in the p50 of
  `iact_mock_server_proc_ms_measured` to below 5ms while the request
  rate is high is a strong indicator of a batch replay attack.

  Recommended alert: rate(iact_mock_server_proc_ms_measured{quantile="0.5"}[5m]) < 5
  AND rate(iact_mock_requests_total[5m]) > 10

  Author: Audit statique — 2026-06-22
  TLP: LEAKED
logsource:
  category: process_creation
  product: linux
detection:
  # Sigma does not natively support Prometheus queries, so this rule
  # documents the SIEM-side PromQL that should be configured to alert.
  # See 05_IOC/alerts/prometheus_alerts.yml for the matching
  # Prometheus alert definition.
  selection_any:
    CommandLine|contains:
      - 'iact_reproducer/mock_server.py'
  condition: selection_any
fields:
  - alert.name
  - alert.value
falsepositives:
  - Lab load tests with pre-computed signatures.
level: medium
tags:
  - attack.defense_evasion
  - car.iac-001
  - prometheus_query_alert
