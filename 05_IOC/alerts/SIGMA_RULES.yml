title: Apple DRM Defender SIEM Alert - Critical (P1)
id: 8f4a1b3c-ire-0015-p1
status: experimental
description: |
  Detects a P1 (critical) alert emitted by the local Apple DRM defender
  (see 06_LOCAL_REPRODUCER/iact_reproducer/mock_server.py). A P1 alert is
  raised when a request carries a public_key_modulus whose SHA-1 matches
  the iRemoval PRO v5.2 bypass modulus (BY-MOD-001). This is the most
  reliable indicator that a forged/relayed iActivation ticket was
  presented. Page on-call immediately.

  Author: Audit statique — 2026-06-22
  TLP: LEAKED
  Reference: BYPASS_CORE.md §16 step 9 (Apple's only visibility point).
references:
  - https://attack.mitre.org/techniques/T1562/
logsource:
  category: process_creation  # mock_server runs as a local process
  product: linux  # the mock_server is Python on Linux/Windows
detection:
  selection_path:
    Image|endswith:
      - '/python3'
      - '\python.exe'
  selection_cmdline:
    CommandLine|contains:
      - 'iact_reproducer/mock_server.py'
      - 'mock_server.py'
  selection_alert:
    CommandLine|contains:
      - 'P1'
      - 'defender_alerts'
  condition: selection_path and selection_cmdline and selection_alert
fields:
  - Image
  - CommandLine
  - User
  - alert.severity
  - alert.check_id
falsepositives:
  - Lab self-tests that deliberately fire P1 alerts to verify the
    pipeline (use a dedicated lab_marker tag in the alert log).
level: critical
tags:
  - attack.defense_evasion
  - attack.t1562
  - car.iac-001  # iActivation bypass

