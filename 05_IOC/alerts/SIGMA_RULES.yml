title: Apple DRM Defender SIEM Alert - High (P2)
id: 8f4a1b3c-ire-0015-p2
status: experimental
description: |
  Detects a P2 (high) alert emitted by the local Apple DRM defender.
  P2 alerts cover explicit bypass markers — BY-EXT-001 (BlackHound tweak
  Bundle ID in plist) and BY-PLI-001 (forbidden plist keys such as
  iRemovalRecord / iRemovalSignature). These are very high-confidence
  indicators that should escalate within the SOC's standard high-sev
  playbook (no need to page immediately, but should be triaged within
  15 minutes).

  Author: Audit statique — 2026-06-22
  TLP: LEAKED
logsource:
  category: process_creation
  product: linux
detection:
  selection_path:
    Image|endswith:
      - '/python3'
      - '\python.exe'
  selection_cmdline:
    CommandLine|contains:
      - 'iact_reproducer/mock_server.py'
      - 'mock_server.py'
  selection_alert:
    CommandLine|contains:
      - 'P2'
  condition: selection_path and selection_cmdline and selection_alert
fields:
  - Image
  - CommandLine
  - User
  - alert.severity
  - alert.check_id
falsepositives:
  - Lab self-tests marked with the lab_marker tag.
level: high
tags:
  - attack.defense_evasion
  - car.iac-001

