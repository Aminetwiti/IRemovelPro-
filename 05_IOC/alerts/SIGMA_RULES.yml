title: iRemoval PRO Mock Server - Skipped Guard Detected
id: 8f4a1b3c-ire-0016
status: experimental
description: |
  Detects when the local mock server's `disabled_counters` increments —
  i.e. an operator started the mock server with one or more `--disable-*`
  CLI flags. In production-like captures this should NEVER happen: a
  permissive middleware (e.g. `--disable-defender`) means the mock is
  accepting forged tickets that the defender would otherwise catch.

  Recommended action: alert on the FIRST increment of any
  `iact_mock_skipped_guards_total` counter when running in non-lab
  mode (lab_marker absent from the request log).

  Author: Audit statique — 2026-06-22
  TLP: LEAKED
logsource:
  category: process_creation
  product: linux
detection:
  selection_path:
    Image|endswith:
      - '/python3'
      - '\python.exe'
  selection_cmdline:
    CommandLine|contains:
      - 'iact_reproducer/mock_server.py'
  selection_disable:
    CommandLine|contains:
      - '--disable-hmac'
      - '--disable-rate-limit'
      - '--disable-blacklist'
      - '--disable-defender'
  condition: selection_path and selection_cmdline and selection_disable
fields:
  - Image
  - CommandLine
  - User
level: high
tags:
  - attack.defense_evasion
  - attack.t1562

