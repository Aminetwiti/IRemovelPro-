title: Apple DRM Defender SIEM Alert - Medium (P3)
id: 8f4a1b3c-ire-0015-p3
status: experimental
description: |
  Detects a P3 (medium / informational) alert emitted by the local Apple
  DRM defender. P3 alerts cover session/timing heuristics — BY-SES-001
  through BY-SES-007 (anti-replay, sequence monotonicity, HWID binding,
  pre-signed ticket detection, clock skew). These should be correlated
  in the SIEM: a single P3 alert is rarely conclusive, but a burst of
  P3 alerts from the same UDID/IP within a 5-minute window often
  precedes a P1 or P2.

  Author: Audit statique — 2026-06-22
  TLP: LEAKED
logsource:
  category: process_creation
  product: linux
detection:
  selection_path:
    Image|endswith:
      - '/python3'
      - '\python.exe'
  selection_cmdline:
    CommandLine|contains:
      - 'iact_reproducer/mock_server.py'
      - 'mock_server.py'
  selection_alert:
    CommandLine|contains:
      - 'P3'
  condition: selection_path and selection_cmdline and selection_alert
fields:
  - Image
  - CommandLine
  - User
  - alert.severity
  - alert.check_id
falsepositives:
  - Lab self-tests marked with the lab_marker tag.
  - Clock skew on a single device (verify NTP sync before escalating).
level: medium
tags:
  - attack.defense_evasion
  - car.iac-001

