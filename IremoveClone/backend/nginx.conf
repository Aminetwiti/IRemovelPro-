worker_processes 1;

events { worker_connections 1024; }

http {
    upstream iremo_php { server php:8080; }
    upstream iremo_python { server python:5000; }

    server {
        listen 80;
        server_name localhost;

        # Route /py/* to the Python/Flask version
        location /py/ {
            proxy_pass http://iremo_python/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Default: PHP version
        location / {
            proxy_pass http://iremo_php;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
